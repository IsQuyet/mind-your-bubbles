# Manually publish a release to GitHub and, optionally, Modrinth.
# The release notes are read from CHANGELOG.md below the separator line.

name: release

on:
  workflow_dispatch:
    inputs:
      destination:
        type: choice
        description: Where to publish the release
        default: GH+MR
        options:
          - GH+MR
          - GH
          - MR

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'microsoft'

      - name: make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: build
        run: ./gradlew build -Pbuild.release=true

      - name: capture build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts
          path: build/libs/

      - name: publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODRINTH_API_KEY: ${{ secrets.MODRINTH_API_KEY }}
        run: ./gradlew publishMods -Pbuild.release=true -Pbuild.release.destination=${{ inputs.destination }}
